name: Run Bot From Release

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9

    - name: Download Release Asset
      run: |
        gh release download Uwu --pattern "*.zip" --clobber
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Unzip project archive
      run: |
        unzip -o *.zip
        rm *.zip

    - name: Install dependencies
      run: |
        # Находим самый верхний уровень проекта (корень воркспейса)
        WORKSPACE_ROOT=$(find . -maxdepth 4 \( -name "pnpm-workspace.yaml" -o -name "package.json" -o -name "requirements.txt" \) -not -path "*/node_modules/*" -not -path "*/.*" | awk -F/ '{print NF, $0}' | sort -n | head -n 1 | cut -d' ' -f2- | xargs dirname 2>/dev/null)
        if [ -z "$WORKSPACE_ROOT" ]; then WORKSPACE_ROOT="."; fi
        
        echo "Корень воркспейса определен как: $WORKSPACE_ROOT"
        cd "$WORKSPACE_ROOT"
        
        # Ставим системные утилиты Linux
        sudo apt-get update && sudo apt-get install -y ffmpeg libsm6 libxext6

        # Проверяем, используется ли pnpm / catalog
        if [ -f pnpm-workspace.yaml ] || grep -q '"catalog:"' package.json 2>/dev/null; then
          echo "Обнаружен pnpm каталог. Устанавливаем зависимости через pnpm..."
          pnpm install
        elif [ -f package.json ]; then
          echo "Установка Node.js пакетов через npm..."
          npm install --production || npm install
        fi
        
        if [ -f requirements.txt ]; then
          echo "Установка Python библиотек..."
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        fi

    - name: Run AI Bot
      timeout-minutes: 300
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        API_ID: ${{ secrets.API_ID }}
        API_HASH: ${{ secrets.API_HASH }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        # Ищем конкретную папку, где лежит исполняемый скрипт бота
        RUN_DIR=$(find . -maxdepth 4 \( -name "bot.py" -o -name "main.py" -o -name "run.py" -o -name "index.js" -o -name "bot.js" \) -not -path "*/node_modules/*" -not -path "*/.*" | head -n 1 | xargs dirname 2>/dev/null)
        
        # Если файлы не нашлись, берем папку с самым глубоким package.json (например, scripts)
        if [ -z "$RUN_DIR" ]; then
          RUN_DIR=$(find . -maxdepth 4 -name "package.json" -not -path "*/node_modules/*" -not -path "*/.*" | awk -F/ '{print NF, $0}' | sort -nr | head -n 1 | cut -d' ' -f2- | xargs dirname 2>/dev/null)
        fi
        if [ -z "$RUN_DIR" ]; then RUN_DIR="."; fi
        
        echo "Переходим в папку запуска: $RUN_DIR"
        cd "$RUN_DIR"
        
        # Создаем файлы окружения прямо перед стартом
        echo "BOT_TOKEN=${{ secrets.BOT_TOKEN }}" > .env
        echo "API_ID=${{ secrets.API_ID }}" >> .env
        echo "API_HASH=${{ secrets.API_HASH }}" >> .env
        echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
        echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env

        echo "=== СТАРТ БОТА ==="
        if [ -f "package.json" ]; then
          if command -v pnpm &> /dev/null; then
            pnpm start || npm start
          else
            npm start
          fi
        elif [ -f "bot.py" ]; then
          python bot.py
        elif [ -f "run.py" ]; then
          python run.py
        elif [ -f "main.py" ]; then
          python main.py
        elif [ -f "index.js" ]; then
          node index.js
        elif [ -f "bot.js" ]; then
          node bot.js
        else
          echo "Критическая ошибка: Не удалось определить файл запуска!"
          ls -la
          exit 1
        fi
