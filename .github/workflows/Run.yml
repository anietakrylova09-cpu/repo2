name: Run Bot From Release

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Download Release Asset
      run: |
        gh release download Uwu --pattern "*.zip" --clobber
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Unzip project archive
      run: |
        unzip -o *.zip
        rm *.zip

    - name: Install dependencies
      run: |
        # Ищем папку проекта, строго игнорируя системный хлам и node_modules
        PROJ_DIR="."
        if [ ! -f "package.json" ] && [ ! -f "requirements.txt" ]; then
          FOUND_DIR=$(find . -maxdepth 3 \( -name "package.json" -o -name "requirements.txt" \) -not -path "*/node_modules/*" -not -path "*/.*" | head -n 1 | xargs dirname 2>/dev/null)
          if [ ! -z "$FOUND_DIR" ]; then
            PROJ_DIR="$FOUND_DIR"
          fi
        fi
        
        echo "Папка с проектом определена как: $PROJ_DIR"
        cd "$PROJ_DIR"
        
        # Устанавливаем системные кодеки на всякий случай
        sudo apt-get update && sudo apt-get install -y ffmpeg libsm6 libxext6

        if [ -f package.json ]; then
          echo "Установка Node.js пакетов..."
          npm install --production || npm install
        fi
        
        if [ -f requirements.txt ]; then
          echo "Установка Python библиотек..."
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        fi

    - name: Run AI Bot
      timeout-minutes: 300
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        API_ID: ${{ secrets.API_ID }}
        API_HASH: ${{ secrets.API_HASH }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        PROJ_DIR="."
        if [ ! -f "package.json" ] && [ ! -f "requirements.txt" ] && [ ! -f "bot.py" ] && [ ! -f "main.py" ]; then
          FOUND_DIR=$(find . -maxdepth 3 \( -name "package.json" -o -name "requirements.txt" -o -name "bot.py" -o -name "main.py" \) -not -path "*/node_modules/*" -not -path "*/.*" | head -n 1 | xargs dirname 2>/dev/null)
          if [ ! -z "$FOUND_DIR" ]; then
            PROJ_DIR="$FOUND_DIR"
          fi
        fi
        
        echo "Переходим в папку запуска: $PROJ_DIR"
        cd "$PROJ_DIR"
        
        # Пересоздаем чистый .env в правильном месте
        echo "BOT_TOKEN=${{ secrets.BOT_TOKEN }}" > .env
        echo "API_ID=${{ secrets.API_ID }}" >> .env
        echo "API_HASH=${{ secrets.API_HASH }}" >> .env
        echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
        echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env

        echo "=== СТАРТ БОТА ==="
        if [ -f "package.json" ] && grep -q '"start"' package.json; then
          npm start
        elif [ -f "bot.py" ]; then
          python bot.py
        elif [ -f "run.py" ]; then
          python run.py
        elif [ -f "main.py" ]; then
          python main.py
        elif [ -f "index.js" ]; then
          node index.js
        elif [ -f "bot.js" ]; then
          node bot.js
        else
          echo "Критическая ошибка: Не удалось определить файл запуска!"
          ls -la
          exit 1
        fi
