name: Run Bot From Release

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Download Release Asset
      run: |
        gh release download Uwu --pattern "*.zip" --clobber
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Unzip project archive
      run: |
        unzip -o *.zip
        rm *.zip

    - name: Install dependencies
      run: |
        # Ищем, в какой папке лежит requirements.txt
        REQ_PATH=$(find . -name "requirements.txt" | head -n 1)
        if [ ! -z "$REQ_PATH" ]; then
          echo "Найдено requirements.txt в: $REQ_PATH"
          pip install -r "$REQ_PATH"
        else
          echo "requirements.txt вообще не найден в архиве!"
        fi

    - name: Run AI Bot
      timeout-minutes: 300
      run: |
        # Ищем, где лежит main.py, переходим туда и запускаем бота
        MAIN_PATH=$(find . -name "main.py" | head -n 1)
        if [ ! -z "$MAIN_PATH" ]; then
          BOT_DIR=$(dirname "$MAIN_PATH")
          echo "Запускаем бота из папки: $BOT_DIR"
          cd "$BOT_DIR"
          python main.py
        else
          echo "Критическая ошибка: main.py не найден в проекте!"
          exit 1
        fi
