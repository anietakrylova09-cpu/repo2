name: Run Bot From Release

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Download Release Asset
      run: |
        gh release download Uwu --pattern "*.zip" --clobber
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Unzip project archive
      run: |
        unzip -o *.zip
        rm *.zip
        
        # Если всё распаковалось в одну подпапку, вытаскиваем файлы наружу
        if [ ! -f main.py ]; then
          echo "Файл main.py не найден в корне. Ищем в подпапках..."
          # Находим первую попавшуюся папку, где лежит main.py, и переносим всё оттуда
          SUBDIR=$(find . -maxdepth 2 -name main.py -exec dirname {} \;)
          if [ ! -z "$SUBDIR" ] && [ "$SUBDIR" != "." ]; then
            echo "Найдена папка проекта: $SUBDIR. Переносим файлы..."
            mv $SUBDIR/* . 2>/dev/null || true
            mv $SUBDIR/.* . 2>/dev/null || true
          fi
        fi

    - name: Install dependencies
      run: |
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        else
          echo "requirements.txt не найден"
        fi

    - name: Run AI Bot
      timeout-minutes: 300
      run: python main.py
