name: Run Bot From Release

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Настраиваем Python окружение
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Настраиваем Node.js окружение (на случай, если бот на JS/TS)
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Download Release Asset
      run: |
        gh release download Uwu --pattern "*.zip" --clobber
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Unzip project archive
      run: |
        unzip -o *.zip
        rm *.zip

    - name: Install dependencies
      run: |
        # Автоматически находим, где лежат конфигурационные файлы проекта
        PROJ_DIR=$(find . -name "requirements.txt" -o -name "package.json" | head -n 1 | xargs dirname 2>/dev/null || echo ".")
        cd "$PROJ_DIR"
        
        if [ -f package.json ]; then
          echo "Обнаружен Node.js. Устанавливаем пакеты..."
          npm install
        fi
        
        if [ -f requirements.txt ]; then
          echo "Обнаружен Python. Устанавливаем библиотеки..."
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        fi

    - name: Run AI Bot
      timeout-minutes: 300
      # Прокидываем все твои секреты
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        API_ID: ${{ secrets.API_ID }}
        API_HASH: ${{ secrets.API_HASH }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        # Находим корень проекта по ключевым файлам
        PROJ_DIR=$(find . -name "requirements.txt" -o -name "package.json" -o -name "*.py" -o -name "*.js" | head -n 1 | xargs dirname 2>/dev/null || echo ".")
        cd "$PROJ_DIR"
        
        echo "=== УМНЫЙ ЗАПУСК БОТА ==="
        
        if [ -f "package.json" ]; then
          echo "Запускаем Node.js проект..."
          npm start || node index.js || node bot.js || node main.js
        elif [ -f "bot.py" ]; then
          python bot.py
        elif [ -f "run.py" ]; then
          python run.py
        elif [ -f "main.py" ]; then
          python main.py
        else
          # Если имя файла совсем нестандартное, запускаем первый попавшийся тяжелый скрипт скрипт в корне
          TARGET=$(find . -maxdepth 1 -name "*.py" ! -name "setup.py" | head -n 1)
          if [ ! -z "$TARGET" ]; then
            echo "Запускаем найденный скрипт: $TARGET"
            python "$TARGET"
          else
            echo "Критическая ошибка: Не удалось автоматически распознать запускатор!"
            ls -la
            exit 1
          fi
        fi
